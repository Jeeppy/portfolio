default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: "Security · Detect hardcoded secrets"

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff-format
        name: "Python · Format with Ruff"
        args: [--config, backend/pyproject.toml]
        files: ^backend/
      - id: ruff
        name: "Python · Check with Ruff"
        args: [--config, backend/pyproject.toml]
        files: ^backend/

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject
        name: "Python · Validate pyproject.toml"
        files: "backend/pyproject.toml"
        additional_dependencies: ["validate-pyproject-schema-store[all]"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        name: "Python · Check types"
        args: [--config-file, backend/pyproject.toml]
        files: ^backend/
        additional_dependencies: ["fastapi", "sqlmodel", "pydantic[mypy]"]

  - repo: https://github.com/pypa/pip-audit
    rev: v2.10.0
    hooks:
      - id: pip-audit
        name: "Security · Audit dependencies"
        args: ["--ignore-vuln", "GHSA-6vgw-5pg2-w6jp"]
        files: ^backend/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.3
    hooks:
      - id: bandit
        name: "Security · Check with Bandit"
        args: ["-c", "backend/pyproject.toml", "-r"]
        files: ^backend/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        name: "Format · Check YAML syntax"
      - id: check-toml
        name: "Format · Check TOML syntax"
      - id: end-of-file-fixer
        name: "Format · Fix end of files"
      - id: trailing-whitespace
        name: "Format · Trim trailing whitespace"
      - id: detect-private-key
        name: "Security · Detect private key"
      - id: check-added-large-files
        name: "Git · Block large files"
        args: ['--maxkb=500']
      - id: check-merge-conflict
        name: "Git · Detect conflict markers"

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.7
    hooks:
      - id: commitizen
        name: "Git · Validate commit message"
        stages: [commit-msg]
